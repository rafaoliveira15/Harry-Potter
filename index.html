<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <!-- CURSOR -->
    <div id="cursor"></div>

    <!-- NAV -->
    <nav id="nav">
      <button onclick="irPara('pg-personagens')">Personagens</button>
      <button onclick="irPara('pg-mapa')">Mapa do Maroto</button>
      <button onclick="irPara('pg-dementadores')">Dementadores</button>
      <button onclick="irPara('pg-virador')">Virador do Tempo</button>
      <button onclick="irPara('pg-timeline')">Timeline</button>
    </nav>

    <!-- ══ 1. ENTRADA ══ -->
    <div id="pg-entrada" class="pagina ativa">
      <canvas id="estrelas"></canvas>
      <div class="titulo-entrada">Hogwarts</div>
      <div id="porta-wrap" onclick="abrirPorta()">
        <div class="metade esquerda" id="esq">
          <img src="img/porta.png" />
        </div>
        <div class="metade direita" id="dir">
          <img src="img/porta.png" />
        </div>
        <div class="hint-porta">Clique para entrar</div>
      </div>
    </div>

    <!-- ══ 2. PERSONAGENS ══ -->

    <div id="pg-personagens" class="pagina">
      <h2>Personagens</h2>
      <div class="personagens-grid" id="grid-personagens"></div>
    </div>

    <!-- Modal personagem -->
    <div id="modal-personagem">
      <div class="modal-box">
        <button class="fechar" onclick="fecharModal()">✕</button>
        <span class="modal-emoji" id="modal-emoji"></span>
        <h3 id="modal-nome"></h3>
        <span class="modal-casa" id="modal-casa"></span>
        <p id="modal-desc"></p>
        <div class="modal-efeito" id="modal-efeito"></div>
      </div>
    </div>

    <!-- ══ 3. MAPA ══ -->
    <div id="pg-mapa" class="pagina">
      <h2>Mapa do Maroto</h2>
      <div id="frase-mapa"></div>
      <div id="mapa-container"></div>
    </div>
    <div id="tooltip-mapa">
      <h4 id="tt-nome"></h4>
      <p id="tt-desc"></p>
    </div>

    <!-- ══ 4. DEMENTADORES ══ -->
    <div id="pg-dementadores" class="pagina">
      <div class="nevoa-dement"></div>
      <button id="expecto-btn" onclick="expecto()">✦ Expecto Patronum ✦</button>
    </div>
    <div id="luz-patrono"></div>

    <!-- ══ 5. VIRADOR ══ -->
    <div id="pg-virador" class="pagina">
      <h2>Virador do Tempo</h2>
      <div class="virador-container">
        <div class="relogio">
          <div class="anel"></div>
          <div class="relogio-face">
            <div class="ponteiro ponteiro-hora"></div>
            <div class="ponteiro ponteiro-min"></div>
          </div>
        </div>
        <div class="livro">
          <div class="livro-capa"></div>
          <div class="pagina-virar"></div>
        </div>
      </div>
      <p
        style="
          color: #8070a0;
          font-size: 0.8rem;
          letter-spacing: 0.2em;
          text-align: center;
          max-width: 400px;
        "
      >
        "Hermione virou o relógio três vezes e o mundo girou ao contrário..."
      </p>
    </div>

    <!-- ══ 6. TIMELINE ══ -->
    <div id="pg-timeline" class="pagina">
      <h2> Linha do Tempo</h2>
      <div class="timeline" id="timeline"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
